<!-- Import Items Modal -->
<div class="modal fade" id="importItemsModal" tabindex="-1" aria-labelledby="importItemsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title" id="importItemsModalLabel">
                    <i class="fas fa-file-import me-2"></i>Import Items from Document
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <!-- Step 1: Search -->
                <div class="p-3 border-bottom bg-white sticky-top">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <select class="form-select" id="importDocType">
                                <option value="invoice">Invoice</option>
                                <option value="offer">Offer</option>
                                <option value="purchase_order">Purchase Order</option>
                                <option value="delivery_challan">Delivery Challan</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-search text-muted"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 ps-0" id="importSearchInput"
                                    placeholder="Search by Number or Customer Name..." autocomplete="off">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Results List -->
                <div id="importSearchResults" class="list-group list-group-flush"
                    style="max-height: 250px; overflow-y: auto;">
                    <!-- Results will appear here -->
                    <div class="text-center py-4 text-muted">
                        <i class="fas fa-search fa-2x mb-2 opacity-50"></i>
                        <p class="mb-0">Type to search for documents</p>
                    </div>
                </div>

                <!-- Step 3: Items Preview (Initially Hidden) -->
                <div id="importItemsPreview" class="d-none bg-light border-top">
                    <div class="p-2 bg-light d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 px-2 fw-bold text-primary" id="selectedDocLabel">Selected Document Items</h6>
                        <button class="btn btn-sm btn-outline-secondary" onclick="backToResults()">
                            <i class="fas fa-arrow-left me-1"></i> Back
                        </button>
                    </div>
                    <div class="table-responsive bg-white">
                        <table class="table table-hover mb-0 caption-top table-sm">
                            <thead class="table-light sticky-top" style="top: 0">
                                <tr>
                                    <th class="ps-3" style="width: 40px">
                                        <input class="form-check-input" type="checkbox" id="selectAllImportItems"
                                            checked>
                                    </th>
                                    <th>Description</th>
                                    <th class="text-center" style="width: 80px">Qty</th>
                                    <th class="text-end pe-3" style="width: 100px">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="importItemsTableBody">
                                <!-- Items will appear here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <span class="text-muted small" id="importStatusText"></span>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmImportBtn" disabled>
                        Import Selected
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .cursor-pointer {
        cursor: pointer;
    }

    .import-doc-item:hover {
        background-color: #f8f9fa;
    }

    .import-doc-item.active {
        background-color: #e9ecef;
        border-left: 4px solid #0d6efd;
    }
</style>
